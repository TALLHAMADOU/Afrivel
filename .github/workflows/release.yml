name: Release

# Déclenché par un tag `vX.Y.Z` : compile le binaire `afrivel` (crate `afrivel-cli`)
# pour les plateformes majeures et publie les archives sur la release GitHub.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked -p afrivel-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          bin="target/${{ matrix.target }}/release/afrivel"
          tar -czf "afrivel-${{ matrix.target }}.tar.gz" -C "$(dirname "$bin")" afrivel
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          $bin = "target/${{ matrix.target }}/release/afrivel.exe"
          Compress-Archive -Path $bin -DestinationPath "afrivel-${{ matrix.target }}.zip"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            afrivel-${{ matrix.target }}.tar.gz
            afrivel-${{ matrix.target }}.zip
          fail_on_unmatched_files: false
